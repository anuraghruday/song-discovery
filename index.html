<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Song Map — Discovery</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Work+Sans:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <style>
    :root {
      --bg: #060810;
      --surface: #0c0e18;
      --card: #10131f;
      --text: #e2e6f0;
      --muted: #4a5068;
      --accent: #f59e0b;
      --accent-glow: rgba(245,158,11,0.25);
      --green: #22c55e;
      --hot: #ef4444;
      --heading: 'Playfair Display', serif;
      --body: 'Work Sans', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      background-image:
        radial-gradient(ellipse at 20% 0%, rgba(245,158,11,0.03) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(34,197,94,0.02) 0%, transparent 50%);
    }

    .grain {
      position: fixed; inset: 0; pointer-events: none; z-index: 9998; opacity: 0.02;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    /* ─── Header ─── */
    .header {
      text-align: center;
      padding: 64px 24px 40px;
      position: relative;
    }

    .header .overline {
      font-size: 0.55rem; font-weight: 700; letter-spacing: 8px;
      text-transform: uppercase; color: var(--accent); margin-bottom: 16px;
    }

    .header h1 {
      font-family: var(--heading); font-size: clamp(2.2rem, 5vw, 3.6rem); font-weight: 700;
      background: linear-gradient(135deg, #fff 0%, #888 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .header p { color: var(--muted); font-size: 0.85rem; font-weight: 300; }

    /* ─── Animated Stats ─── */
    .stats-bar {
      display: flex; justify-content: center; gap: 60px;
      padding: 32px 24px; flex-wrap: wrap;
    }

    .stat { text-align: center; }

    .stat .number {
      font-family: var(--heading); font-size: 3.2rem; font-weight: 900;
      color: var(--accent); line-height: 1;
    }

    .stat .label {
      font-size: 0.55rem; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 4px; margin-top: 6px;
    }

    .stat .progress-ring {
      width: 80px; height: 6px; background: rgba(255,255,255,0.04);
      border-radius: 3px; margin: 10px auto 0; overflow: hidden;
    }

    .stat .progress-fill {
      height: 100%; border-radius: 3px;
      background: linear-gradient(90deg, var(--accent), var(--green));
      width: 0%;
      transition: width 2s cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* ─── Map ─── */
    .map-container {
      max-width: 1200px; margin: 20px auto;
      padding: 0 24px; position: relative;
    }

    .map-frame {
      position: relative;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.03);
      border-radius: 20px;
      overflow: hidden;
      padding: 20px;
    }

    .map-frame::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 30% 50%, rgba(245,158,11,0.02) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 30%, rgba(34,197,94,0.015) 0%, transparent 50%);
      pointer-events: none;
    }

    #map-svg {
      width: 100%; height: auto; display: block;
    }

    .land { fill: #161a28; stroke: #1e2236; stroke-width: 0.5; }
    .graticule { fill: none; stroke: rgba(255,255,255,0.015); stroke-width: 0.5; }
    .sphere { fill: none; stroke: rgba(255,255,255,0.03); stroke-width: 1; }

    /* Markers */
    .marker-glow {
      fill: var(--accent); opacity: 0;
      animation: markerGlow 3s ease-in-out infinite;
    }

    @keyframes markerGlow {
      0% { r: 4; opacity: 0.5; }
      100% { r: 20; opacity: 0; }
    }

    .marker-ring {
      fill: none; stroke: var(--accent); stroke-width: 1.5; opacity: 0.3;
    }

    .marker-dot {
      fill: var(--accent);
      stroke: var(--bg); stroke-width: 2;
      cursor: pointer;
      filter: drop-shadow(0 0 4px var(--accent-glow));
      transition: r 0.3s ease, filter 0.3s;
    }

    .marker-dot:hover {
      r: 7;
      filter: drop-shadow(0 0 12px var(--accent-glow));
    }

    /* ─── Tooltip ─── */
    .tooltip {
      position: fixed; pointer-events: none;
      background: rgba(10,12,20,0.92);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(245,158,11,0.15);
      border-radius: 16px;
      padding: 20px 24px;
      min-width: 260px;
      opacity: 0; transform: translateY(10px) scale(0.95);
      transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      z-index: 1000;
      box-shadow: 0 16px 48px rgba(0,0,0,0.6), 0 0 40px rgba(245,158,11,0.05);
    }

    .tooltip.visible { opacity: 1; transform: translateY(0) scale(1); }
    .tooltip .tt-flag { font-size: 1.8rem; margin-bottom: 6px; }
    .tooltip .tt-country { font-family: var(--heading); font-size: 1.15rem; color: white; }
    .tooltip .tt-genre { font-size: 0.65rem; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin: 6px 0; }
    .tooltip .tt-song { font-size: 0.85rem; color: rgba(255,255,255,0.65); }
    .tooltip .tt-date { font-size: 0.68rem; color: var(--muted); margin-top: 8px; }

    /* ─── Legend ─── */
    .legend {
      display: flex; justify-content: center; gap: 36px;
      padding: 24px; flex-wrap: wrap;
    }

    .legend-item {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.65rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase;
    }

    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

    /* ─── Cards ─── */
    .cards-section {
      max-width: 1200px; margin: 48px auto; padding: 0 24px;
    }

    .section-head {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px; flex-wrap: wrap; gap: 16px;
    }

    .section-head h2 { font-family: var(--heading); font-size: 1.5rem; }

    .pills { display: flex; gap: 6px; flex-wrap: wrap; }

    .pill {
      padding: 7px 18px; background: transparent;
      border: 1px solid rgba(255,255,255,0.05); border-radius: 24px;
      color: var(--muted); font-size: 0.65rem; font-weight: 500;
      font-family: var(--body); letter-spacing: 1px; cursor: pointer;
      transition: all 0.3s;
    }

    .pill:hover, .pill.active {
      border-color: var(--accent); color: var(--accent);
      background: rgba(245,158,11,0.05);
      box-shadow: 0 0 20px rgba(245,158,11,0.05);
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.03);
      border-radius: 14px;
      padding: 22px;
      transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      position: relative;
      overflow: hidden;
    }

    .card::after {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--green));
      opacity: 0; transition: opacity 0.4s;
    }

    .card:hover {
      border-color: rgba(245,158,11,0.12);
      transform: translateY(-6px);
      box-shadow: 0 16px 48px rgba(245,158,11,0.05);
    }

    .card:hover::after { opacity: 1; }

    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .card-country { font-family: var(--heading); font-size: 1.1rem; color: white; }
    .card-emoji { font-size: 1.1rem; }

    .card-genre {
      display: inline-block; padding: 3px 12px;
      background: rgba(245,158,11,0.08); color: var(--accent);
      border-radius: 12px; font-size: 0.6rem; font-weight: 600;
      letter-spacing: 1px; margin-bottom: 10px;
    }

    .card-song { font-size: 0.85rem; color: rgba(255,255,255,0.55); }
    .card-song strong { color: rgba(255,255,255,0.8); font-weight: 500; }
    .card-date { font-size: 0.65rem; color: var(--muted); margin-top: 10px; }

    .footer {
      text-align: center; padding: 60px 24px;
      border-top: 1px solid rgba(255,255,255,0.03); margin-top: 60px;
    }

    .footer p { font-size: 0.65rem; color: var(--muted); letter-spacing: 4px; text-transform: uppercase; }

    @media (max-width: 768px) {
      .stats-bar { gap: 32px; }
      .stat .number { font-size: 2.2rem; }
      .section-head { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="grain"></div>
  <div class="tooltip" id="tooltip"></div>

  <div class="header">
    <div class="overline">Your Musical Journey</div>
    <h1>World Song Map</h1>
    <p>Every country explored through music — one song at a time</p>
  </div>

  <div class="stats-bar" id="statsBar"></div>

  <div class="map-container">
    <div class="map-frame">
      <svg id="map-svg" viewBox="0 0 960 500"></svg>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--accent);box-shadow:0 0 8px var(--accent-glow);"></div> Explored</div>
    <div class="legend-item"><div class="legend-dot" style="background:#161a28;border:1px solid #1e2236;"></div> Awaiting</div>
  </div>

  <div class="cards-section">
    <div class="section-head">
      <h2>Explored Countries</h2>
      <div class="pills" id="pills"></div>
    </div>
    <div class="cards-grid" id="cardsGrid"></div>
  </div>

  <div class="footer"><p>Morning Song Discovery · Updated Daily</p></div>

  <script>
    // ─── DATA ───
    const visited = [];

    const total = 195;
    const emoji = { positive:'👍', negative:'👎', more_of_this:'🔥' };
    const visitedSet = new Set(visited.map(v => v.iso));

    // ─── Stats with animated counters ───
    const genres = [...new Set(visited.map(v => v.genre))];
    const regions = [...new Set(visited.map(v => v.region))];
    const pct = Math.round(visited.length / total * 100);

    document.getElementById('statsBar').innerHTML = `
      <div class="stat">
        <div class="number" data-target="${visited.length}">0</div>
        <div class="label">Countries</div>
        <div class="progress-ring"><div class="progress-fill" data-width="${pct}"></div></div>
      </div>
      <div class="stat"><div class="number" data-target="${genres.length}">0</div><div class="label">Genres</div></div>
      <div class="stat"><div class="number" data-target="${regions.length}">0</div><div class="label">Regions</div></div>
      <div class="stat"><div class="number" data-target="${total - visited.length}">0</div><div class="label">Remaining</div></div>
    `;

    // Animated counter
    document.querySelectorAll('.stat .number').forEach(el => {
      const target = parseInt(el.dataset.target);
      gsap.to({ val: 0 }, {
        val: target, duration: 2, ease: 'power2.out', delay: 0.5,
        onUpdate: function() { el.textContent = Math.round(this.targets()[0].val); }
      });
    });

    // Animate progress fill
    setTimeout(() => {
      document.querySelectorAll('.progress-fill').forEach(el => {
        el.style.width = el.dataset.width + '%';
      });
    }, 300);

    // ─── D3 Map — loads from CDN, with fallback ───
    const svg = d3.select('#map-svg');
    const width = 960, height = 500;
    const projection = d3.geoNaturalEarth1().scale(155).translate([width/2, height/2.2]);
    const pathGen = d3.geoPath().projection(projection);
    const tooltip = document.getElementById('tooltip');

    // Draw graticule + sphere immediately (always visible)
    svg.append('path')
      .datum(d3.geoGraticule10())
      .attr('class', 'graticule')
      .attr('d', pathGen);

    svg.append('path')
      .datum({ type: 'Sphere' })
      .attr('class', 'sphere')
      .attr('d', pathGen);

    function drawMarkers() {
      const g = svg.append('g').attr('class', 'markers');
      visited.forEach((v, i) => {
        const [x, y] = projection([v.lng, v.lat]);
        if (!x || !y) return;

        // Glow pulse
        g.append('circle').attr('cx', x).attr('cy', y)
          .attr('class', 'marker-glow')
          .style('animation-delay', `${i * 0.25}s`);

        // Outer ring
        g.append('circle').attr('cx', x).attr('cy', y).attr('r', 10)
          .attr('class', 'marker-ring');

        // Dot
        g.append('circle').attr('cx', x).attr('cy', y).attr('r', 4.5)
          .attr('class', 'marker-dot')
          .on('mouseover', (event) => {
            tooltip.innerHTML = `
              <div class="tt-country">${v.country} ${emoji[v.feedback]||''}</div>
              <div class="tt-genre">${v.genre}</div>
              <div class="tt-song"><strong>${v.song}</strong> — ${v.artist}</div>
              <div class="tt-date">${v.date} · ${v.region}</div>`;
            tooltip.classList.add('visible');
          })
          .on('mousemove', (event) => {
            tooltip.style.left = (event.clientX + 18) + 'px';
            tooltip.style.top = (event.clientY - 18) + 'px';
          })
          .on('mouseout', () => tooltip.classList.remove('visible'));
      });

      // Animate markers in
      gsap.fromTo('.marker-dot', { r: 0, opacity: 0 },
        { r: 4.5, opacity: 1, duration: 0.6, stagger: 0.08, ease: 'back.out(2)', delay: 1 });
      gsap.fromTo('.marker-ring', { r: 0, opacity: 0 },
        { r: 10, opacity: 0.3, duration: 0.8, stagger: 0.08, ease: 'power2.out', delay: 1.1 });
    }

    // Try loading world topology from CDN
    d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
      .then(world => {
        const countries = topojson.feature(world, world.objects.countries);
        svg.selectAll('.land')
          .data(countries.features)
          .enter().append('path')
          .attr('class', d => 'land' + (visitedSet.has(String(d.id)) ? ' visited' : ''))
          .attr('d', pathGen)
          .style('fill', d => visitedSet.has(String(d.id)) ? 'rgba(245,158,11,0.25)' : '#161a28')
          .style('stroke', d => visitedSet.has(String(d.id)) ? 'rgba(245,158,11,0.5)' : '#1e2236');

        // Fade countries in
        gsap.fromTo('.land', { opacity: 0 }, { opacity: 1, duration: 1.5, ease: 'power2.out' });
        drawMarkers();
      })
      .catch(() => {
        // FALLBACK: If CDN fetch fails, just draw markers on the graticule grid
        // The grid lines still show the map structure
        console.log('World atlas CDN unavailable — showing markers on grid');
        drawMarkers();
      });

    // ─── Cards ───
    const allRegions = [...new Set(visited.map(v => v.region))].sort();
    document.getElementById('pills').innerHTML =
      `<button class="pill active" onclick="filter('all',this)">All</button>` +
      allRegions.map(r => `<button class="pill" onclick="filter('${r}',this)">${r}</button>`).join('');

    function filter(region, btn) {
      document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render(region);
    }

    function render(f = 'all') {
      const data = (f === 'all' ? visited : visited.filter(v => v.region === f))
        .sort((a, b) => b.date.localeCompare(a.date));

      document.getElementById('cardsGrid').innerHTML = data.map(v => `
        <div class="card">
          <div class="card-header">
            <div class="card-country">${v.country}</div>
            <div class="card-emoji">${emoji[v.feedback]||''}</div>
          </div>
          <div class="card-genre">${v.genre}</div>
          <div class="card-song"><strong>${v.song}</strong> — ${v.artist}</div>
          <div class="card-date">${v.date} · ${v.region}</div>
        </div>
      `).join('');

      gsap.fromTo('.card', { opacity: 0, y: 24 },
        { opacity: 1, y: 0, duration: 0.5, stagger: 0.04, ease: 'power2.out' });
    }

    render();
  </script>
</body>
</html>
